type Account @entity {
  id: ID!
  hasKYC: Boolean!
  tokenBalance: BigInt!
}

type Transfer @entity(immutable: true) {
  id: ID!
  from: Bytes!
  to: Bytes!
  value: BigInt!
  transactionHash: Bytes!
}

type Approval @entity(immutable: true) {
  id: ID!
  owner: Bytes!
  spender: Bytes!
  value: BigInt!
  transactionHash: Bytes!
}

type KycUpdate @entity(immutable: true) {
  id: ID!
  account: Bytes!
  status: Boolean!
  blockTimestamp: BigInt!
}