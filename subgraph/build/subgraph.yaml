specVersion: 0.0.5
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: RWAToken
    network: arbitrum-sepolia
    source:
      address: "0xd0d95536CdEfE06012Ed98Cb263eC10809f4Fe2A"
      abi: RWAToken
      startBlock: 269144000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Account
        - Transfer
        - Approval
      abis:
        - name: RWAToken
          file: out/RWAToken.sol/RWAToken.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: Approval(indexed address,indexed address,uint256)
          handler: handleApproval
      file: RWAToken/RWAToken.wasm
  - kind: ethereum
    name: KYCPassport
    network: arbitrum-sepolia
    source:
      address: "0x16818F8075f0fb8AE6B316917EEc57F04a7B72c7"
      abi: KYCPassport
      startBlock: 269144000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Account
        - KycUpdate
      abis:
        - name: KYCPassport
          file: out/KYCPassport.sol/KYCPassport.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleKYCTransfer
      file: KYCPassport/KYCPassport.wasm
