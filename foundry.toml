[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
via_ir = false

# Fuzz configuration
[fuzz]
runs = 1000
seed = "0x1234"

# Invariant configuration
[invariant]
runs = 500
depth = 100
call_override = false

# Coverage — exclude mocks and test files
[profile.default.coverage]
exclude_pattern = ["test/", "src/mocks/"]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
